name: DSE Watchlist Engine

on:
  schedule:
    # 12:15 PM Dhaka time (UTC+6) -> 06:15 AM UTC (Sun-Thu)
    - cron: '15 6 * * 0-4'
    # 3:00 PM Dhaka time (UTC+6) -> 09:00 AM UTC (Sun-Thu)
    - cron: '0 9 * * 0-4'
  workflow_dispatch: # Allows you to manually trigger a run from GitHub

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run Midday Check (12:15 PM)
        # Only runs if triggered by the 12:15 PM cron schedule
        if: github.event.schedule == '15 6 * * 0-4'
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python run_midday.py
        
      - name: Run End-of-Day Scan (3:00 PM)
        # Runs on the 3:00 PM schedule OR if manually triggered
        if: github.event.schedule == '0 9 * * 0-4' || github.event_name == 'workflow_dispatch'
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python run_eod.py
